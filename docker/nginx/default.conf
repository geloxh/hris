server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 12M;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Enable HSTS once you're actually serving over HTTPS (behind a TLS-terminating proxy/load balancer):
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Never allow direct access to source, config, storage, or vendor directories
    location ~ ^/(src|database|docker|storage|bootstrap\.php|\.env|composer\.(json|lock))/? {
        deny all;
        return 404;
    }

    # Serve static frontend files (plain HTML/CSS/JS) as-is
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Every PHP request funnels through the single front controller.
    # This regex location MUST be declared before the catch-all ~\.php$ deny
    # below - nginx evaluates regex locations in file order and stops at the
    # first match, so order here is load-bearing, not cosmetic.
    location ~ ^/index\.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY ""; # mitigate the httpoxy class of vulnerabilities
        fastcgi_read_timeout 60;
    }

    # Never execute any other PHP file directly (defense in depth)
    location ~ \.php$ {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }
}
