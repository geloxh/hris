security:
    enable_authenticator_manager: true

    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # The existing HR staff user provider
        # TODO: App\Entity\User doesn't exist yet — this provider (and the
        # `main` firewall below) won't compile until it's created. Left
        # in place since it's the next step, not this one — see the
        # project's punch list.
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

        # a dummy/in-memory provider for the ARS "user" — since HmacAuthenticator
        # authenticates the *system*, not a real user record
        ars_system_provider:
            memory:
                users:
                    ars-system: { password: '', roles: ['ROLE_ARS_SYSTEM'] }
    
    firewalls:
        # ARS callback firewall - stateless, HMAC-only, checked first
        ars_callback:
            pattern: ^/api/ars-callback
            stateless: true
            provider: ars_system_provider
            custom_authenticators:
                - App\Security\HmacAuthenticator

        # Normal HR staff facing firewall - session/login based
        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
            logout:
                path: app_logout ## or existing login mechanism

    # Note: only the *first* matching access_control rule is applied, so
    # order matters — most specific first, catch-all last.
    access_control:
        - { path: ^/api/ars-callback, roles: ROLE_ARS_SYSTEM }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:

        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
