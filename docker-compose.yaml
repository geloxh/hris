version: '3.8'

services:
  ars-nginx:
    image: nginx:alpine
    volumes:
      - ./automated-requesting-system:/var/www/html
      - ./nginx/ars.conf:/etc/nginx/conf.d/default.conf
    networks: [internal]
    depends_on: [ars-php]

  ars-php:
    build: ./docker/php-ars
    volumes:
      - ./automated-requesting-system:/var/www/html
    networks: [internal]
    env_file: [./automated-requesting-system/.env]

  ars-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ars_db
    volumes: [ars_db_data:/var/lib/mysql]
    networks: [internal]

  hris-nginx:
    image: nginx:alpine
    volumes:
      - ./hris:/var/www/html
      - ./nginx/hris.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks: [internal]
    depends_on: [hris-php]

  hris-php:
    build: ./docker/php-hris
    volumes:
      - ./hris:/var/www/html
    networks: [internal]
    env_file: [./hris/.env]
    depends_on: [hris-db, redis]

  hris-worker:
    build: ./docker/php-hris
    command: php bin/console messenger:consume async -vv
    volumes:
      - ./hris:/var/www/html
    networks: [internal]
    depends_on: [redis, hris-db]

  hris-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: hris_db
    volumes: [hris_db_data:/var/lib/mysql]
    networks: [internal]

  redis:
    image: redis:alpine
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  ars_db_data:
  hris_db_data: